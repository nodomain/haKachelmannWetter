name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install homeassistant ruff
      - name: Ruff
        run: ruff check custom_components/kachelmannwetter/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-homeassistant-custom-component
      - name: Run tests
        run: pytest tests/ -v -p no:socket --override-ini="asyncio_mode=auto"
