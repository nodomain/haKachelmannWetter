name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install homeassistant ruff mypy
      - name: Ruff
        run: ruff check custom_components/kachelmannwetter/
      - name: Mypy
        run: mypy custom_components/kachelmannwetter/ --ignore-missing-imports
