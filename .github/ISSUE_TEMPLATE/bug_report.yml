name: Bug report
description: Report a bug with the KachelmannWetter integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: "e.g. 2.1.0"
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.4.3"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs from Settings → System → Logs
      render: text
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Download from Settings → Devices → KachelmannWetter → three dots → Download diagnostics
      render: json
